<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EstudiApp - Organiza tus clases</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>EstudiApp 📚</h1>
        <p>Toma fotos, organiza por horario y estudia con Flashcards.</p>
        <!-- Cambia 'estudiapp.apk' por el nombre real de tu archivo cuando lo subas -->
        <a href="estudiapp.apk" class="btn-download">Descargar APK</a>
    </header>

    <section class="features">
        <div class="card">
            <h3>📂 Orden Automático</h3>
            <p>Tus fotos se guardan en carpetas por materia según tu hora de clase.</p>
        </div>
        <div class="card">
            <h3>🔒 Privacidad</h3>
            <p>Fotos invisibles en la galería gracias a la extensión .estudi.</p>
        </div>
    </section>

    <footer>
        <p>Creado por Erick Sebastian L. &copy; 2026</p>
    </footer>
</body>
</html>
